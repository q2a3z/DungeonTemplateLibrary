name: build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      test_windows:
        description: 'Test on Windows'
        type: boolean
        default: true
env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true
jobs:
  Windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@master

    - name: Setup VSWhere.exe
      uses: warrenbuckley/Setup-VSWhere@v1

    - name: VSWhere MSBuild
      shell: pwsh
      run: |
        @echo off
        setlocal enabledelayedexpansion
        set toolpath="%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
        set version=[15,17)
        for /f "usebackq tokens=*" %%i in (`%toolpath% -version !version! -property installationPath`) do (
          echo %%i
        )
